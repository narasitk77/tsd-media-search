services:
  app:
    build: .
    container_name: mimir-websearch
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false   # ถ้าไม่มีไฟล์ .env ให้ใช้ environment variables จาก host แทน
    environment:
      METADATA_TOOL_URL: "http://metadata-tool:8000"
    volumes:
      # Persist activity log and changelog outside the container
      - ./data:/app/data
    depends_on:
      - metadata-tool
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: mimir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mimir_metadata
      POSTGRES_USER: mimir
      POSTGRES_PASSWORD: mimir_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mimir -d mimir_metadata"]
      interval: 10s
      timeout: 5s
      retries: 5

  metadata-tool:
    build:
      context: ./metadata-tool
      dockerfile: Dockerfile
    container_name: mimir-metadata-tool
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - path: .env
        required: false
    environment:
      APP_ROOT_PATH: "/ai-tool"
      QDRANT_URL: "http://qdrant:6333"
      DATABASE_URL: "postgresql://mimir:mimir_secret@postgres:5432/mimir_metadata"
    volumes:
      - metadata_data:/app/data
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/stats')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mimir-qdrant
    restart: unless-stopped
    expose:
      - "6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  metadata_data:
    driver: local
  postgres_data:
    driver: local
