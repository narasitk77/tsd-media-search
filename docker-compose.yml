services:
  app:
    build: .
    container_name: mimir-websearch
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false   # ถ้าไม่มีไฟล์ .env ให้ใช้ environment variables จาก host แทน
    environment:
      METADATA_TOOL_URL: "http://metadata-tool:8000"
    volumes:
      # Persist activity log and changelog outside the container
      - ./data:/app/data
    depends_on:
      - metadata-tool
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  metadata-tool:
    build:
      context: ./metadata-tool
      dockerfile: Dockerfile
    container_name: mimir-metadata-tool
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - path: .env
        required: false
    environment:
      APP_ROOT_PATH: "/ai-tool"
    volumes:
      - metadata_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/stats')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  metadata_data:
    driver: local
