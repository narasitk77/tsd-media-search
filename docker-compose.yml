services:
  app:
    build: .
    container_name: mimir-websearch
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false   # ถ้าไม่มีไฟล์ .env ให้ใช้ environment variables จาก host แทน
    volumes:
      # Persist activity log and changelog outside the container
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
